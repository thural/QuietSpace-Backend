spring:
  application:
    mailing:
      frontend:
        activation-url: http://localhost:3000/activate
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
  datasource:
    url: jdbc:h2:mem:quietspace
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        auto_quote_keyword: true
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

logging:
  level:
    root: INFO
    org.springframework.messaging: INFO
    org.springframework.web.socket: INFO
    org.hibernate.orm.jdbc.bind: ERROR
    dev.thural.quietspace.service: INFO
    org.springframework.security: INFO
    org.hibernate.sql: ERROR
    org.springframework.web.servlet.handler.HandlerMappingIntrospector: ERROR
  logback:
    rollingpolicy:
      max-file-size: 2MB
      max-history: 3

server:
  port: 8080
