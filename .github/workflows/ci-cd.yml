name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Code style check with Ruff
        run: poetry run ruff check .

      - name: Type check with MyPy
        run: poetry run mypy app/
      - name: Security scan with Bandit
        run: poetry run bandit -c pyproject.toml -r app/
      - name: Security scan with Safety
        run: poetry run safety scan --full-report
      - name: Run tests with pytest
        run: poetry run pytest tests/ -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/test_db

      - name: Build Docker image
        run: docker build -t quietspace-backend:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d -p 8000:8000 --name test-container quietspace-backend:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
