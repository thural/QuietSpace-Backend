name: QuietSpace monolith Backend pipeline

on:
  push:
    branches: [ "main", "prod" ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'infrastructure/docker/**'
      - '.github/workflows/*-monolith.yml'

jobs:

  test:
    name: Test Project
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: test project
        run: |
          ./gradlew test

  build:
    runs-on: ubuntu-22.04
    name: Build Docker Image
    if: github.ref == 'refs/heads/prod'
    needs: [ test ]
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract Project Version
        id: project-version
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' build.gradle.kts)
          echo "VERSION=$VERSION" >> GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: infrastructure/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}/quietspace:monolith-${{steps.project-version.outputs.VERSION}},ghcr.io/${{ github.repository }}/quietspace:monolith-latest
          build-args: |
            PROFILE=default
            VERSION=${{steps.project-version.outputs.VERSION}}

  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/prod'
    needs: [ build ]
    env:
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_IP: ${{ secrets.VPS_IP }}
      DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER_USERNAME: ${{ secrets.DB_USER_USERNAME }}
      DB_USER_PASSWORD: ${{ secrets.DB_USER_PASSWORD }}
      DB_PORT_NUMBER: ${{ secrets.DB_PORT_NUMBER }}
      DB_HOST_NAME: ${{ secrets.DB_HOST_NAME }}
      SERVER_PORT_NUMBER: ${{ secrets.SERVER_PORT_NUMBER }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      ACTIVATION_URL: ${{ secrets.ACTIVATION_URL }}
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
      MAILDEV_HOST: ${{ secrets.MAILDEV_HOST }}
      MAILDEV_PORT: ${{ secrets.MAILDEV_PORT }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Create Deployment Folder
        run: ssh $VPS_USERNAME@$VPS_IP "mkdir -p deployment"

      - name: Copy Docker Compose File
        run: scp infrastructure/docker/docker-compose.yaml $VPS_USERNAME@$VPS_IP:deployment/docker-compose.yaml

      - name: Create .env file on VPS
        run: |
          cat > /tmp/deploy-env << EOF
          DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
          DB_NAME=$DB_NAME
          DB_USER_USERNAME=$DB_USER_USERNAME
          DB_USER_PASSWORD=$DB_USER_PASSWORD
          DB_PORT_NUMBER=$DB_PORT_NUMBER
          DB_HOST_NAME=$DB_HOST_NAME
          MYSQL_ROOT_PASSWORD=$DB_ROOT_PASSWORD
          MYSQL_DATABASE=$DB_NAME
          MYSQL_USER=$DB_USER_USERNAME
          MYSQL_PASSWORD=$DB_USER_PASSWORD
          SERVER_PORT_NUMBER=$SERVER_PORT_NUMBER
          SPRING_PROFILES_ACTIVE=prod
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          ACTIVATION_URL=$ACTIVATION_URL
          MAILDEV_HOST=$MAILDEV_HOST
          MAILDEV_PORT=$MAILDEV_PORT
          FRONTEND_HOST=$FRONTEND_HOST
          FRONTEND_PORT=$FRONTEND_PORT
          EOF
          scp /tmp/deploy-env $VPS_USERNAME@$VPS_IP:deployment/.env
          rm /tmp/deploy-env

      - name: Deploy to VPS
        run: |
          ssh $VPS_USERNAME@$VPS_IP << 'DEPLOY_EOF'
          cd deployment
          docker compose -f docker-compose.yaml pull -q
          docker compose -f docker-compose.yaml up -d
          DEPLOY_EOF
