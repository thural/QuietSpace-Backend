services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: quietspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mail-dev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://test:test@postgres:5432/quietspace
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key
      - DEBUG=True
      - SMTP_HOST=mail-dev
      - SMTP_PORT=1025
      - SMTP_USER=noreply@example.com
      - SMTP_PASSWORD=
    depends_on:
      - postgres
      - redis
      - mail-dev

  celery:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./app:/app/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://test:test@postgres:5432/quietspace
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key
    depends_on:
      - postgres
      - redis
      - mail-dev

volumes:
  postgres_data:
